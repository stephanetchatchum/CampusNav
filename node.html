<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CampusNav Node Editor v2 — 820x1000</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #0f172a; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
#toolbar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; padding: 8px 12px; background: #1e293b; border-bottom: 1px solid #334155; flex-shrink: 0; }
label { font-size: 11px; color: #94a3b8; }
button { padding: 4px 11px; border-radius: 5px; border: 1px solid #475569; background: #1e293b; color: #e2e8f0; font-size: 11px; cursor: pointer; }
button:hover { background: #334155; }
button.active { background: #2563eb; border-color: #2563eb; color: #fff; }
button.danger { background: #7f1d1d; border-color: #dc2626; color: #fca5a5; }
button.floor-btn { min-width: 80px; font-weight: 600; }
button.floor-btn.active { background: #7c3aed; border-color: #7c3aed; }
select, input[type=text] { padding: 3px 7px; border-radius: 5px; border: 1px solid #475569; background: #0f172a; color: #e2e8f0; font-size: 11px; }
#main { display: flex; flex: 1; overflow: hidden; }
#canvas-wrap { flex: 1; overflow: auto; background: #0f172a; display: flex; align-items: flex-start; justify-content: flex-start; }
canvas { display: block; cursor: crosshair; }
#json-panel { width: 300px; background: #1e293b; border-left: 1px solid #334155; display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; }
#json-panel h3 { padding: 6px 10px; font-size: 11px; color: #94a3b8; border-bottom: 1px solid #334155; flex-shrink: 0; }
.json-out { font-family: monospace; font-size: 9px; padding: 8px; overflow: auto; white-space: pre; }
#out-nodes { color: #a3e635; background: #0f172a; flex: 1; }
#out-edges { color: #fdba74; background: #0a0a0a; height: 160px; }
.copy-row { padding: 5px 8px; border-top: 1px solid #334155; flex-shrink: 0; }
#status { padding: 4px 12px; background: #1e293b; border-top: 1px solid #334155; font-size: 10px; color: #64748b; flex-shrink: 0; display: flex; gap: 16px; }
.sep { width: 1px; height: 20px; background: #334155; margin: 0 2px; }
input[type=range] { width: 70px; accent-color: #2563eb; }
</style>
</head>
<body>
<div id="toolbar">
  <label>Floor:</label>
  <button class="floor-btn active" id="fbtn-2" onclick="switchFloor(2)">Floor 2</button>
  <button class="floor-btn" id="fbtn-1" onclick="switchFloor(1)">Floor 1</button>
  <button class="floor-btn" id="fbtn-0" onclick="switchFloor(0)">Ground</button>
  <div class="sep"></div>
  <label>Mode:</label>
  <button class="active" id="btn-node" onclick="setMode('node')">+ Node</button>
  <button id="btn-edge" onclick="setMode('edge')">~ Edge</button>
  <button id="btn-move" onclick="setMode('move')">✥ Move</button>
  <button id="btn-delete" onclick="setMode('delete')">✕ Delete</button>
  <div class="sep"></div>
  <label>Type:</label>
  <select id="node-type">
    <option value="junction">Junction</option>
    <option value="entrance">Room door</option>
    <option value="staircase">Staircase</option>
    <option value="elevator">Elevator</option>
    <option value="building_entry">Building entry</option>
  </select>
  <input type="text" id="node-label" placeholder="Label" style="width:110px"/>
  <div class="sep"></div>
  <label>Opacity:</label>
  <input type="range" id="opacity-slider" min="0" max="100" value="45" oninput="setOpacity(this.value)"/>
  <span id="opacity-val">45%</span>
  <div class="sep"></div>
  <button class="danger" onclick="clearFloor()">Clear floor</button>
</div>

<div id="main">
  <div id="canvas-wrap">
    <canvas id="c" width="820" height="1000"></canvas>
  </div>
  <div id="json-panel">
    <h3 id="nodes-title">nodes.json</h3>
    <div id="out-nodes" class="json-out">[ ]</div>
    <div class="copy-row"><button onclick="copyAll()" style="width:100%">📋 Copy ALL nodes.json</button></div>
    <h3 id="edges-title">edges.json</h3>
    <div id="out-edges" class="json-out">[ ]</div>
    <div class="copy-row"><button onclick="copyEdges()" style="width:100%">📋 Copy ALL edges.json</button></div>
  </div>
</div>

<div id="status">
  <span id="st-floor">Floor 2</span>
  <span id="st-mode">Mode: place node</span>
  <span id="st-counts">Nodes: 0 | Edges: 0</span>
  <span id="st-pos">x: — , y: —</span>
  <span style="color:#334155">Canvas is exactly 820×1000 — same as Map2D SVG viewbox. Coordinates are 1:1.</span>
</div>

const FLOOR_LABELS = {2:'Floor 2',1:'Floor 1',0:'Ground Floor'};
const FLOOR_PREFIX = {2:'SC-F2',1:'SC-F1',0:'SC-F0'};
const BUILDING = 'Social Commons';

const NODE_COLOR = {
  junction:'#3b82f6', entrance:'#22c55e',
  staircase:'#f59e0b', elevator:'#a855f7', building_entry:'#ef4444'
};

const state = {
  2:{nodes:[],edges:[],nc:1,ec:1},
  1:{nodes:[],edges:[],nc:1,ec:1},
  0:{nodes:[],edges:[],nc:1,ec:1},
};

let floor=2, mode='node', edgeStart=null, opacity=0.45;
let dragNode=null, dragOffX=0, dragOffY=0;
const bgImgs={};

[0,1,2].forEach(f=>{
  const img=new Image();
  img.onload=()=>{ bgImgs[f]=img; if(f===floor)draw(); };
  img.src=IMGS[f];
});

function setOpacity(v){ opacity=v/100; document.getElementById('opacity-val').textContent=v+'%'; draw(); }

function draw(){
  const s=state[floor];
  ctx.clearRect(0,0,820,1000);
  ctx.fillStyle='#1e293b'; ctx.fillRect(0,0,820,1000);
  if(bgImgs[floor]){ ctx.globalAlpha=opacity; ctx.drawImage(bgImgs[floor],0,0,820,1000); ctx.globalAlpha=1; }

  // edges
  s.edges.forEach(e=>{
    const a=s.nodes.find(n=>n.id===e.from), b=s.nodes.find(n=>n.id===e.to);
    if(!a||!b)return;
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
    ctx.strokeStyle='#60a5fa'; ctx.lineWidth=2;
    ctx.setLineDash([5,4]); ctx.stroke(); ctx.setLineDash([]);
    const mx=(a.x+b.x)/2, my=(a.y+b.y)/2;
    const dist=Math.round(Math.sqrt((b.x-a.x)**2+(b.y-a.y)**2)*0.1);
    ctx.fillStyle='#93c5fd'; ctx.font='10px Arial';
    ctx.textAlign='center'; ctx.fillText(dist+'m',mx,my-4); ctx.textAlign='left';
  });

  if(edgeStart){
    const a=s.nodes.find(n=>n.id===edgeStart);
    if(a){ ctx.beginPath(); ctx.arc(a.x,a.y,16,0,Math.PI*2); ctx.strokeStyle='#f59e0b'; ctx.lineWidth=3; ctx.stroke(); }
  }

  s.nodes.forEach(n=>{
    const c=NODE_COLOR[n.type]||'#60a5fa', r=9;
    ctx.shadowColor=c; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.arc(n.x,n.y,r,0,Math.PI*2); ctx.fillStyle=c; ctx.fill();
    ctx.shadowBlur=0;
    ctx.beginPath(); ctx.arc(n.x,n.y,r,0,Math.PI*2); ctx.strokeStyle='white'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.fillStyle='white'; ctx.font='bold 9px Arial'; ctx.textAlign='center';
    ctx.fillText(n.id.split('-').slice(2).join('-'),n.x,n.y-r-3);
    if(n.label&&n.label!==n.id){ ctx.font='8px Arial'; ctx.fillStyle='#cbd5e1'; ctx.fillText(n.label,n.x,n.y+r+11); }
    ctx.textAlign='left';
  });

  updateStatus(); updateJSON();
}

function getPos(e){
  const r=canvas.getBoundingClientRect();
  return { x:Math.round((e.clientX-r.left)*(820/r.width)), y:Math.round((e.clientY-r.top)*(1000/r.height)) };
}

function getNodeAt(x,y){ return state[floor].nodes.find(n=>Math.sqrt((n.x-x)**2+(n.y-y)**2)<14); }

canvas.addEventListener('mousedown',e=>{
  if(mode!=='move')return;
  const {x,y}=getPos(e);
  const hit=getNodeAt(x,y);
  if(hit){ dragNode=hit; dragOffX=x-hit.x; dragOffY=y-hit.y; }
});

canvas.addEventListener('mousemove',e=>{
  const {x,y}=getPos(e);
  document.getElementById('st-pos').textContent='x:'+x+' y:'+y;
  if(dragNode){ dragNode.x=x-dragOffX; dragNode.y=y-dragOffY; draw(); }
});

canvas.addEventListener('mouseup',()=>{ if(dragNode){ dragNode=null; updateJSON(); } });

canvas.addEventListener('click',e=>{
  if(mode==='move')return;
  const {x,y}=getPos(e);
  const s=state[floor];
  const pfx=FLOOR_PREFIX[floor];

  if(mode==='node'){
    const type=document.getElementById('node-type').value;
    const lbl=document.getElementById('node-label').value.trim();
    const p={junction:'J',entrance:'DOOR',staircase:'STAIRS',elevator:'EL',building_entry:'ENTRY'}[type];
    const id=pfx+'-'+p+'-'+s.nc++;
    s.nodes.push({id,label:lbl||id,type,x,y,connects_to:[]});
    draw();
  } else if(mode==='edge'){
    const hit=getNodeAt(x,y);
    if(!hit)return;
    if(!edgeStart){ edgeStart=hit.id; draw(); }
    else {
      if(edgeStart!==hit.id){
        const a=s.nodes.find(n=>n.id===edgeStart);
        const dist=Math.round(Math.sqrt((hit.x-a.x)**2+(hit.y-a.y)**2)*0.1);
        s.edges.push({id:'e'+s.ec++,from:edgeStart,to:hit.id,distance:dist});
        if(!a.connects_to.includes(hit.id))a.connects_to.push(hit.id);
        if(!hit.connects_to.includes(edgeStart))hit.connects_to.push(edgeStart);
      }
      edgeStart=null; draw();
    }
  } else if(mode==='delete'){
    const hit=getNodeAt(x,y);
    if(hit){
      s.nodes=s.nodes.filter(n=>n.id!==hit.id);
      s.edges=s.edges.filter(e=>e.from!==hit.id&&e.to!==hit.id);
      s.nodes.forEach(n=>{n.connects_to=n.connects_to.filter(c=>c!==hit.id);});
      draw();
    }
  }
});

function switchFloor(f){
  floor=f; edgeStart=null; dragNode=null;
  [0,1,2].forEach(n=>document.getElementById('fbtn-'+n).classList.toggle('active',n===f));
  document.getElementById('st-floor').textContent=FLOOR_LABELS[f];
  draw(); updateJSON();
}

function setMode(m){
  mode=m; edgeStart=null; dragNode=null;
  ['node','edge','move','delete'].forEach(x=>document.getElementById('btn-'+x).classList.toggle('active',x===m));
  document.getElementById('st-mode').textContent='Mode: '+m;
  canvas.style.cursor=m==='move'?'grab':'crosshair';
  draw();
}

function clearFloor(){
  if(!confirm('Clear '+FLOOR_LABELS[floor]+'?'))return;
  const s=state[floor]; s.nodes=[]; s.edges=[]; s.nc=1; s.ec=1; edgeStart=null; draw(); updateJSON();
}

function updateStatus(){
  const s=state[floor];
  document.getElementById('st-counts').textContent='Nodes:'+s.nodes.length+' | Edges:'+s.edges.length;
}

function updateJSON(){
  const s=state[floor];
  const out=s.nodes.map(n=>({id:n.id,label:n.label,building:BUILDING,floor,x:n.x,y:n.y,type:n.type,connects_to:n.connects_to}));
  document.getElementById('out-nodes').textContent=JSON.stringify(out,null,2);
  document.getElementById('out-edges').textContent=JSON.stringify(s.edges,null,2);
  document.getElementById('nodes-title').textContent='nodes — '+FLOOR_LABELS[floor]+' ('+s.nodes.length+')';
  document.getElementById('edges-title').textContent='edges — '+FLOOR_LABELS[floor]+' ('+s.edges.length+')';
}

function allNodes(){ return [2,1,0].flatMap(f=>state[f].nodes.map(n=>({id:n.id,label:n.label,building:BUILDING,floor:f,x:n.x,y:n.y,type:n.type,connects_to:n.connects_to}))); }
function allEdges(){ return [2,1,0].flatMap(f=>state[f].edges); }
function copyAll(){ navigator.clipboard.writeText(JSON.stringify(allNodes(),null,2)).then(()=>alert('Copied '+allNodes().length+' nodes!')); }
function copyEdges(){ navigator.clipboard.writeText(JSON.stringify(allEdges(),null,2)).then(()=>alert('Copied '+allEdges().length+' edges!')); }

draw();
</script>
</body>
</html>
