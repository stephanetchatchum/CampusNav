<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CampusNav — Node Editor (All Floors)</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #0f172a; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
#toolbar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; padding: 8px 12px; background: #1e293b; border-bottom: 1px solid #334155; flex-shrink: 0; }
#toolbar label { font-size: 11px; color: #94a3b8; }
button { padding: 4px 11px; border-radius: 5px; border: 1px solid #475569; background: #1e293b; color: #e2e8f0; font-size: 11px; cursor: pointer; }
button:hover { background: #334155; }
button.active { background: #2563eb; border-color: #2563eb; color: #fff; }
button.danger { background: #7f1d1d; border-color: #dc2626; color: #fca5a5; }
button.floor-btn { min-width: 80px; font-weight: 600; }
button.floor-btn.active { background: #7c3aed; border-color: #7c3aed; }
select, input[type=text] { padding: 3px 7px; border-radius: 5px; border: 1px solid #475569; background: #0f172a; color: #e2e8f0; font-size: 11px; }
input[type=range] { width: 80px; accent-color: #2563eb; }
#main { display: flex; flex: 1; overflow: hidden; }
#canvas-wrap { flex: 1; overflow: auto; background: #0f172a; }
canvas { display: block; cursor: crosshair; }
#json-panel { width: 320px; background: #1e293b; border-left: 1px solid #334155; display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; }
#json-panel h3 { padding: 6px 10px; font-size: 11px; color: #94a3b8; border-bottom: 1px solid #334155; flex-shrink: 0; }
.json-out { font-family: monospace; font-size: 9px; padding: 8px; overflow: auto; white-space: pre; flex: 1; }
#out-nodes { color: #a3e635; background: #0f172a; }
#out-edges { color: #fdba74; background: #0a0a0a; max-height: 180px; }
.copy-row { padding: 5px 8px; border-top: 1px solid #334155; flex-shrink: 0; }
#status { padding: 4px 12px; background: #1e293b; border-top: 1px solid #334155; font-size: 10px; color: #64748b; flex-shrink: 0; display: flex; gap: 16px; }
.legend { display: flex; gap: 8px; align-items: center; }
.dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; margin-right: 2px; }
.sep { width: 1px; height: 20px; background: #334155; margin: 0 4px; }
</style>
</head>
<body>

<div id="toolbar">
  <!-- Floor selector -->
  <label>Floor:</label>
  <button class="floor-btn active" id="fbtn-2" onclick="switchFloor(2)">Floor 2</button>
  <button class="floor-btn" id="fbtn-1" onclick="switchFloor(1)">Floor 1</button>
  <button class="floor-btn" id="fbtn-0" onclick="switchFloor(0)">Ground</button>
  <div class="sep"></div>

  <!-- Mode -->
  <label>Mode:</label>
  <button class="active" id="btn-node" onclick="setMode('node')">+ Node</button>
  <button id="btn-edge" onclick="setMode('edge')">~ Edge</button>
  <button id="btn-delete" onclick="setMode('delete')">✕ Delete</button>
  <div class="sep"></div>

  <!-- Type -->
  <label>Type:</label>
  <select id="node-type">
    <option value="junction">Junction</option>
    <option value="entrance">Room door</option>
    <option value="staircase">Staircase</option>
    <option value="elevator">Elevator</option>
    <option value="building_entry">Building entry</option>
  </select>

  <!-- Label -->
  <input type="text" id="node-label" placeholder="Label (optional)" style="width:130px"/>
  <div class="sep"></div>

  <!-- Opacity -->
  <label>Image:</label>
  <input type="range" id="opacity-slider" min="0" max="100" value="40" oninput="setOpacity(this.value)"/>
  <span id="opacity-val">40%</span>
  <div class="sep"></div>

  <button class="danger" onclick="clearFloor()">Clear floor</button>

  <!-- Legend -->
  <div class="sep"></div>
  <div class="legend">
    <span class="dot" style="background:#3b82f6"></span>Junc
    <span class="dot" style="background:#22c55e"></span>Door
    <span class="dot" style="background:#f59e0b"></span>Stairs
    <span class="dot" style="background:#a855f7"></span>Elev
    <span class="dot" style="background:#ef4444"></span>Entry
  </div>
</div>

<div id="main">
  <div id="canvas-wrap">
    <canvas id="c"></canvas>
  </div>

  <div id="json-panel">
    <h3 id="nodes-title">nodes — Floor 2 (0 nodes)</h3>
    <div id="out-nodes" class="json-out">[ ]</div>
    <div class="copy-row">
      <button onclick="copyAll()" style="width:100%">📋 Copy ALL floors nodes.json</button>
    </div>
    <h3 id="edges-title">edges — Floor 2 (0 edges)</h3>
    <div id="out-edges" class="json-out">[ ]</div>
    <div class="copy-row">
      <button onclick="copyEdges()" style="width:100%">📋 Copy ALL floors edges.json</button>
    </div>
  </div>
</div>

<div id="status">
  <span id="st-floor">Floor 2</span>
  <span id="st-mode">Mode: place node</span>
  <span id="st-counts">Nodes: 0 | Edges: 0</span>
  <span id="st-pos">x: — , y: —</span>
  <span style="color:#334155">Click to place node · Edge mode: click node A then node B</span>
</div>

const FLOOR_LABELS = { 2: 'Floor 2', 1: 'Floor 1', 0: 'Ground Floor' };
const FLOOR_PREFIX = { 2: 'SC-F2', 1: 'SC-F1', 0: 'SC-F0' };
const FLOOR_BUILDING = 'Social Commons';

const NODE_COLOR = {
  junction: '#3b82f6', entrance: '#22c55e',
  staircase: '#f59e0b', elevator: '#a855f7', building_entry: '#ef4444'
};

// ── per-floor state ────────────────────────────────────────────────────────
const state = {
  2: { nodes: [], edges: [], nodeCounter: 1, edgeCounter: 1 },
  1: { nodes: [], edges: [], nodeCounter: 1, edgeCounter: 1 },
  0: { nodes: [], edges: [], nodeCounter: 1, edgeCounter: 1 },
};

let activeFloor = 2;
let mode = 'node';
let edgeStart = null;
let bgOpacity = 0.4;
const bgImgs = {};

// ── canvas ─────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvas-wrap');

// preload all images
[0, 1, 2].forEach(f => {
  const img = new Image();
  img.onload = () => { bgImgs[f] = img; if (f === activeFloor) { resizeCanvas(); draw(); } };
  img.src = IMAGES_B64[f];
});

function resizeCanvas() {
  const img = bgImgs[activeFloor];
  if (img) { canvas.width = img.naturalWidth; canvas.height = img.naturalHeight; }
  else { canvas.width = 1200; canvas.height = 900; }
}
resizeCanvas();

// ── switch floor ───────────────────────────────────────────────────────────
function switchFloor(f) {
  edgeStart = null;
  activeFloor = f;
  [0, 1, 2].forEach(n => {
    document.getElementById('fbtn-' + n).classList.toggle('active', n === f);
  });
  document.getElementById('st-floor').textContent = FLOOR_LABELS[f];
  resizeCanvas();
  draw();
  updateJSON();
}

// ── opacity ────────────────────────────────────────────────────────────────
function setOpacity(v) {
  bgOpacity = v / 100;
  document.getElementById('opacity-val').textContent = v + '%';
  draw();
}

// ── draw ───────────────────────────────────────────────────────────────────
function draw() {
  const s = state[activeFloor];
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#1e293b';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // bg image
  const img = bgImgs[activeFloor];
  if (img) {
    ctx.globalAlpha = bgOpacity;
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    ctx.globalAlpha = 1;
  }

  // edges
  s.edges.forEach(e => {
    const a = s.nodes.find(n => n.id === e.from);
    const b = s.nodes.find(n => n.id === e.to);
    if (!a || !b) return;
    ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
    ctx.strokeStyle = '#60a5fa'; ctx.lineWidth = 2;
    ctx.setLineDash([6, 4]); ctx.stroke(); ctx.setLineDash([]);
    const mx = (a.x+b.x)/2, my = (a.y+b.y)/2;
    const dist = Math.round(Math.sqrt((b.x-a.x)**2+(b.y-a.y)**2)*0.1);
    ctx.fillStyle = '#93c5fd'; ctx.font = 'bold 11px Arial';
    ctx.textAlign = 'center'; ctx.fillText(dist+'m', mx, my-4); ctx.textAlign = 'left';
  });

  // edge-start ring
  if (edgeStart) {
    const a = s.nodes.find(n => n.id === edgeStart);
    if (a) {
      ctx.beginPath(); ctx.arc(a.x, a.y, 16, 0, Math.PI*2);
      ctx.strokeStyle = '#f59e0b'; ctx.lineWidth = 3; ctx.stroke();
    }
  }

  // nodes
  s.nodes.forEach(n => {
    const color = NODE_COLOR[n.type] || '#60a5fa';
    const r = 9;
    ctx.shadowColor = color; ctx.shadowBlur = 10;
    ctx.beginPath(); ctx.arc(n.x, n.y, r, 0, Math.PI*2);
    ctx.fillStyle = color; ctx.fill(); ctx.shadowBlur = 0;
    ctx.beginPath(); ctx.arc(n.x, n.y, r, 0, Math.PI*2);
    ctx.strokeStyle = 'white'; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.fillStyle = 'white'; ctx.font = 'bold 9px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(n.id.split('-').slice(2).join('-'), n.x, n.y - r - 3);
    if (n.label && n.label !== n.id) {
      ctx.font = '9px Arial'; ctx.fillStyle = '#cbd5e1';
      ctx.fillText(n.label, n.x, n.y + r + 11);
    }
    ctx.textAlign = 'left';
  });

  updateStatus();
}

// ── interaction ────────────────────────────────────────────────────────────
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: Math.round((e.clientX - rect.left) * (canvas.width / rect.width)),
    y: Math.round((e.clientY - rect.top) * (canvas.height / rect.height))
  };
}

function getNodeAt(x, y) {
  return state[activeFloor].nodes.find(n => Math.sqrt((n.x-x)**2+(n.y-y)**2) < 14);
}

canvas.addEventListener('mousemove', e => {
  const {x,y} = getPos(e);
  document.getElementById('st-pos').textContent = 'x: '+x+' , y: '+y;
});

canvas.addEventListener('click', e => {
  const {x,y} = getPos(e);
  const s = state[activeFloor];
  const prefix = FLOOR_PREFIX[activeFloor];

  if (mode === 'node') {
    const type = document.getElementById('node-type').value;
    const lbl = document.getElementById('node-label').value.trim();
    const pfx = {junction:'J',entrance:'DOOR',staircase:'STAIRS',elevator:'EL',building_entry:'ENTRY'}[type];
    const id = prefix+'-'+pfx+'-'+s.nodeCounter++;
    s.nodes.push({ id, label: lbl||id, type, x, y, connects_to: [] });
    draw(); updateJSON();
  } else if (mode === 'edge') {
    const hit = getNodeAt(x, y);
    if (!hit) return;
    if (!edgeStart) { edgeStart = hit.id; draw(); }
    else {
      if (edgeStart !== hit.id) {
        const a = s.nodes.find(n => n.id === edgeStart);
        const dist = Math.round(Math.sqrt((hit.x-a.x)**2+(hit.y-a.y)**2)*0.1);
        s.edges.push({ id:'e'+s.edgeCounter++, from:edgeStart, to:hit.id, distance:dist });
        if (!a.connects_to.includes(hit.id)) a.connects_to.push(hit.id);
        if (!hit.connects_to.includes(edgeStart)) hit.connects_to.push(edgeStart);
      }
      edgeStart = null; draw(); updateJSON();
    }
  } else if (mode === 'delete') {
    const hit = getNodeAt(x, y);
    if (hit) {
      s.nodes = s.nodes.filter(n=>n.id!==hit.id);
      s.edges = s.edges.filter(e=>e.from!==hit.id&&e.to!==hit.id);
      s.nodes.forEach(n=>{n.connects_to=n.connects_to.filter(c=>c!==hit.id);});
      draw(); updateJSON();
    }
  }
});

// ── mode ───────────────────────────────────────────────────────────────────
function setMode(m) {
  mode = m; edgeStart = null;
  ['node','edge','delete'].forEach(x=>{
    document.getElementById('btn-'+x).classList.toggle('active',x===m);
  });
  const labels = {node:'place node',edge:'draw edge (click A then B)',delete:'delete node'};
  document.getElementById('st-mode').textContent = 'Mode: '+labels[m];
  draw();
}

// ── clear ──────────────────────────────────────────────────────────────────
function clearFloor() {
  if (!confirm('Clear all nodes and edges on '+FLOOR_LABELS[activeFloor]+'?')) return;
  const s = state[activeFloor];
  s.nodes=[]; s.edges=[]; s.nodeCounter=1; s.edgeCounter=1; edgeStart=null;
  draw(); updateJSON();
}

// ── status ─────────────────────────────────────────────────────────────────
function updateStatus() {
  const s = state[activeFloor];
  document.getElementById('st-counts').textContent =
    'Nodes: '+s.nodes.length+' | Edges: '+s.edges.length;
}

// ── json ───────────────────────────────────────────────────────────────────
function updateJSON() {
  const s = state[activeFloor];
  const nodesOut = s.nodes.map(n=>({
    id:n.id, label:n.label, building:FLOOR_BUILDING,
    floor:activeFloor, x:n.x, y:n.y, type:n.type, connects_to:n.connects_to
  }));
  document.getElementById('out-nodes').textContent = JSON.stringify(nodesOut, null, 2);
  document.getElementById('out-edges').textContent = JSON.stringify(s.edges, null, 2);
  document.getElementById('nodes-title').textContent =
    'nodes — '+FLOOR_LABELS[activeFloor]+' ('+s.nodes.length+' nodes)';
  document.getElementById('edges-title').textContent =
    'edges — '+FLOOR_LABELS[activeFloor]+' ('+s.edges.length+' edges)';
}

function allNodes() {
  return [2,1,0].flatMap(f => state[f].nodes.map(n=>({
    id:n.id, label:n.label, building:FLOOR_BUILDING,
    floor:f, x:n.x, y:n.y, type:n.type, connects_to:n.connects_to
  })));
}

function allEdges() {
  return [2,1,0].flatMap(f => state[f].edges);
}

function copyAll() {
  navigator.clipboard.writeText(JSON.stringify(allNodes(), null, 2))
    .then(()=>alert('All nodes copied! ('+allNodes().length+' nodes across 3 floors)'));
}

function copyEdges() {
  navigator.clipboard.writeText(JSON.stringify(allEdges(), null, 2))
    .then(()=>alert('All edges copied! ('+allEdges().length+' edges across 3 floors)'));
}

updateJSON();
</script>
</body>
